# ── Agent-Optima Helm values ──────────────────────────────────────────────────
#
# Example install:
#   helm install optima ./charts/agent-optima \
#     --set secret.jwtSecret="$(openssl rand -hex 32)" \
#     --set secret.databaseUrl="postgresql://user:pass@postgres:5432/agentoptima"
#
# All four images are built from the same monorepo.  Override image.tag per
# service if you have separate CI tags, or set a global tag via --set.

# ── Global image settings ─────────────────────────────────────────────────────
global:
  # Override all image tags at once (used when every service has the same version)
  imageTag: ""

# ── Per-service image configuration ──────────────────────────────────────────
images:
  apiGateway:
    repository: ghcr.io/ronyariv/optima/api-gateway
    tag: latest
    pullPolicy: IfNotPresent
  controlApi:
    repository: ghcr.io/ronyariv/optima/control-api
    tag: latest
    pullPolicy: IfNotPresent
  analyticsWorkers:
    repository: ghcr.io/ronyariv/optima/analytics-workers
    tag: latest
    pullPolicy: IfNotPresent
  web:
    repository: ghcr.io/ronyariv/optima/web
    tag: latest
    pullPolicy: IfNotPresent

# ── Secrets ───────────────────────────────────────────────────────────────────
secret:
  # jwtSecret and databaseUrl are written into a K8s Secret named
  # <release>-secrets.  Set these on the command line — never commit real values.
  jwtSecret: ""
  databaseUrl: ""
  # If you already have a K8s Secret, set its name here and leave the above blank.
  # The secret must contain keys: jwt-secret  database-url
  existingSecret: ""

# ── Database ──────────────────────────────────────────────────────────────────
database:
  # "disable" inside the cluster (TLS handled by the K8s network), "require" for
  # external/cloud databases.
  ssl: "disable"

# ── API Gateway ───────────────────────────────────────────────────────────────
apiGateway:
  replicaCount: 1
  port: 3000
  logLevel: info
  rateLimitMax: 200
  rateLimitWindowMs: 60000
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

# ── Control API ───────────────────────────────────────────────────────────────
controlApi:
  replicaCount: 1
  port: 3001
  logLevel: info
  # CORS origin for the web dashboard — set to the external web URL in production
  corsOrigin: "http://localhost:5173"
  service:
    type: ClusterIP
    port: 3001
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

# ── Analytics Workers ─────────────────────────────────────────────────────────
analyticsWorkers:
  replicaCount: 1
  logLevel: info
  pollIntervalMs: 1000
  visibilityTimeoutSecs: 30
  maxRetries: 3
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

# ── Web Dashboard ─────────────────────────────────────────────────────────────
web:
  replicaCount: 1
  port: 80
  # Must point to the control-api Service as seen by the browser
  viteApiUrl: "http://localhost:3001"
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      memory: 32Mi
      cpu: 10m
    limits:
      memory: 64Mi
      cpu: 100m

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  # Routes:
  #   /          → web
  #   /api       → api-gateway
  #   /control   → control-api
  hosts:
    - host: optima.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: api-gateway
        - path: /control
          pathType: Prefix
          service: control-api
  tls: []
    # - secretName: optima-tls
    #   hosts:
    #     - optima.example.com

# ── Pod-level settings (shared) ───────────────────────────────────────────────
podAnnotations: {}
podSecurityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
