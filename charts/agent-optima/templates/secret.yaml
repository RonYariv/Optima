{{- if not .Values.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-optima.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-optima.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ required "secret.jwtSecret is required when secret.existingSecret is not set" .Values.secret.jwtSecret | quote }}
  database-url: {{ required "secret.databaseUrl is required when secret.existingSecret is not set" .Values.secret.databaseUrl | quote }}
{{- end }}
