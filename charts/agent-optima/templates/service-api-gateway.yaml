apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-optima.fullname" . }}-api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-optima.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  type: {{ .Values.apiGateway.service.type }}
  ports:
    - port: {{ .Values.apiGateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "agent-optima.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
