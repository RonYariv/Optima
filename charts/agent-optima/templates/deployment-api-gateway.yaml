apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-optima.fullname" . }}-api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-optima.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "agent-optima.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api-gateway
  template:
    metadata:
      labels:
        {{- include "agent-optima.labels" . | nindent 8 }}
        app.kubernetes.io/component: api-gateway
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api-gateway
          image: "{{ .Values.images.apiGateway.repository }}:{{ include "agent-optima.imageTag" (dict "global" .Values.global "svc" .Values.images.apiGateway) }}"
          imagePullPolicy: {{ .Values.images.apiGateway.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.apiGateway.port }}
              protocol: TCP
          env:
            {{- include "agent-optima.commonEnv" . | nindent 12 }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "agent-optima.secretName" . }}
                  key: jwt-secret
            - name: PORT
              value: {{ .Values.apiGateway.port | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.apiGateway.logLevel | quote }}
            - name: RATE_LIMIT_MAX
              value: {{ .Values.apiGateway.rateLimitMax | quote }}
            - name: RATE_LIMIT_WINDOW_MS
              value: {{ .Values.apiGateway.rateLimitWindowMs | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
