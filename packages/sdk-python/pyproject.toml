[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "optima-sdk"
version = "0.1.0"
description = "Agent-Optima ingest SDK for Python agents"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = ["agents", "observability", "llm", "tracing"]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries",
]
# Zero mandatory dependencies — uses stdlib only (urllib / asyncio)
dependencies = []

[project.optional-dependencies]
# Async client uses aiohttp when available
async = ["aiohttp>=3.9"]

[tool.setuptools.packages.find]
where = ["src"]
